<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DressGPT — Versie 3</title>
  <style>
    :root{
      --bg:#10162a;
      --card:#182042;
      --text:#eef2ff;
      --muted:#b7c0e6;
      --line:rgba(255,255,255,.14);

      --accent:#a7b4ff;     /* pastel lavender */
      --good:#43d38e;
      --bad:#ff6a86;

      --radius:18px;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: system-ui, Arial;
      color: var(--text);
      background:
        radial-gradient(1100px 650px at 15% 10%, rgba(167,180,255,.20), transparent 60%),
        radial-gradient(900px 550px at 88% 35%, rgba(143,232,198,.14), transparent 55%),
        var(--bg);
    }
    .wrap{ max-width: 980px; margin: 24px auto; padding: 0 16px; }
    header{ display:flex; align-items:flex-end; justify-content:space-between; gap:16px; }
    h1{ margin:0; font-size:34px; letter-spacing:.2px; }
    .tag{ color:var(--muted); font-size:13px; margin-top:6px; }
    .pill{
      border:1px solid var(--line);
      background: rgba(255,255,255,.06);
      color: var(--muted);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .card{
      margin-top: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: 0 10px 28px rgba(0,0,0,.22);
    }
    .title{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin: 0 0 10px 0;
      font-weight: 900;
      letter-spacing: .2px;
    }
    .hint{ color:var(--muted); font-size: 13px; margin-top: 6px; }

    .grid2{ display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
    .grid3{ display:grid; grid-template-columns: 1fr 1fr 1fr; gap:12px; }

    label{ display:block; margin-top:10px; font-weight:800; font-size: 13px; color:#dfe6ff; }
    select, input, button{
      width:100%;
      padding: 11px 12px;
      margin-top: 6px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(8,10,22,.35);
      color: var(--text);
      font-size: 16px;
      outline: none;
    }
    button{
      cursor:pointer;
      font-weight: 950;
      letter-spacing:.2px;
      background: linear-gradient(135deg, rgba(167,180,255,.95), rgba(167,180,255,.62));
      border-color: rgba(167,180,255,.55);
      color: #0b1020;
      margin-top: 14px;
    }
    .btn-ghost{
      background: rgba(255,255,255,.06);
      border-color: var(--line);
      color: var(--text);
      font-weight: 850;
    }

    .hidden{ display:none; }

    .result{
      margin-top: 12px;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(0,0,0,.16);
      font-size: 26px;
      font-weight: 950;
      text-align:center;
    }
    .result.good{ color: var(--good); }
    .result.bad{ color: var(--bad); }

    .feedback{
      margin-top: 12px;
      padding: 12px;
      border-radius: 14px;
      border: 1px dashed rgba(255,255,255,.18);
      background: rgba(0,0,0,.12);
    }
    .fb-row{ display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .small{ margin-top: 8px; color: var(--muted); font-size: 13px; }

    @media (max-width: 820px){
      header{ flex-direction: column; align-items:flex-start; }
      .grid2, .grid3, .fb-row{ grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
<div id="tipbox" class="tipbox hidden">—</div>
</html>
  <div class="wrap">
    <header>
      <div>
        <h1>DressGPT</h1>
        <div class="tag">Versie 3 — één pagina, strakker, minder fouten</div>
      </div>
      <span class="pill">local: 127.0.0.1:8000</span>
    </header>

    <!-- BASIS -->
    <div class="card">
      <div class="title">Basis 👕 <span class="pill">stijl + bovenstuk</span></div>

      <div class="grid2">
        <div>
          <label>Style</label>
          <select id="style">
            <option value="casual">casual</option>
            <option value="business">business</option>
            <option value="chique">chique</option>
            <option value="sporty">sporty</option>
            <option value="preppy">preppy</option>
            <option value="netjes" selected>netjes</option>
          </select>
        </div>

        <div>
          <label>Bovenstuk</label>
          <select id="garment_type">
            <option value="jurk">jurk</option>
            <option value="tshirt" selected>T-shirt</option>
            <option value="longsleeve">lange mouwen</option>
            <option value="blouse">blouse</option>
            <option value="trui">trui</option>
            <option value="overhemd">overhemd</option>
          </select>
          <div class="hint">Bij “jurk” verbergen we het onderstuk.</div>
        </div>
      </div>

      <div class="grid2">
        <div>
          <label>Bovenstuk kleur</label>
          <select id="top_color"></select>
        </div>

        <div>
          <label>Vest/laag erover</label>
          <select id="outer_layer">
            <option value="none" selected>none</option>
            <option value="spijkerjasje">spijkerjasje</option>
            <option value="leren_jasje">leren jasje</option>
            <option value="bomberjack">bomberjack</option>
            <option value="colbert">colbert</option>
          </select>
        </div>
      </div>

      <div class="grid2 hidden" id="outer_color_block">
        <div>
          <label>Vest kleur</label>
          <select id="outer_layer_color"></select>
        </div>
        <div></div>
      </div>
    </div>

    <!-- ONDERSTUK -->
    <div class="card" id="bottom_block">
      <div class="title">Onderstuk 👖 <span class="pill">broek/rok</span></div>

      <div class="grid2">
        <div>
          <label>Onderstuk type</label>
          <select id="bottom_type">
            <option value="broek" selected>broek</option>
            <option value="rok">rok</option>
            <option value="none">none</option>
          </select>
        </div>

        <div>
          <label>Onderstuk soort</label>
          <select id="bottom_subtype"></select>
        </div>
      </div>

      <div class="grid2" id="bottom_color_row">
        <div>
          <label>Onderstuk kleur</label>
          <select id="bottom_color"></select>
        </div>
        <div></div>
      </div>
    </div>

    <!-- ACCESSOIRES -->
    <div class="card">
      <div class="title">Accessoires 👜 <span class="pill">schoenen + tas</span></div>

      <div class="grid2">
        <div>
          <label>Schoenen type</label>
          <select id="shoe_type">
            <option value="sneakers" selected>sneakers</option>
            <option value="sportschoenen">sportschoenen</option>
            <option value="sandalen">sandalen</option>
            <option value="slippers">slippers</option>
            <option value="hakken">hakken</option>
            <option value="laarzen">laarzen</option>
            <option value="veterschoenen">veterschoenen</option>
          </select>
        </div>

        <div>
          <label>Schoenen kleur</label>
          <select id="shoes_color"></select>
        </div>
      </div>

      <div class="grid2">
        <div>
          <label>Tas type</label>
          <select id="bag_type">
            <option value="none" selected>none</option>
            <option value="handtas">handtas</option>
            <option value="schoudertas">schoudertas</option>
            <option value="rugtas">rugtas</option>
            <option value="clutch">clutch</option>
            <option value="werktas">werktas</option>
          </select>
        </div>

        <div class="hidden" id="bag_color_block">
          <label>Tas kleur</label>
          <select id="bag_color"></select>
        </div>
      </div>

      <button id="btn" type="button">Check outfit</button>

      <div class="result" id="result">—</div>
      <div class="small" id="err"></div>

      <!-- FEEDBACK -->
      <div class="feedback hidden" id="feedback_block">
        <div class="fb-row">
          <button id="fb_yes" type="button" class="btn-ghost">👍 Eens</button>
          <button id="fb_no" type="button" class="btn-ghost">👎 Niet eens</button>
        </div>

        <div class="hidden" id="fb_note_block">
          <label>Waarom?</label>
          <input id="fb_note" placeholder="kort: wat klopt er niet?" />
          <button id="fb_send" type="button" class="btn-ghost">Verstuur</button>
        </div>

        <div class="small" id="fb_status"></div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "http://127.0.0.1:8000/predict";
    const FEEDBACK_URL = "http://127.0.0.1:8000/feedback";
    const el = (id) => document.getElementById(id);

    let lastPayload = null;
    let lastResult = null;

    const COLORS = [
      "zwart","wit",
      "rood","lichtrood","donkerrood",
      "oranje","lichtoranje","donkeroranje",
      "geel","lichtgeel","donkergeel",
      "groen","lichtgroen","donkergroen",
      "blauw","lichtblauw","donkerblauw",
      "paars","lichtpaars","donkerpaars",
      "roze","lichtroze","donkerroze",
      "zwart-wit","rood-wit","blauw-wit","roze-wit","zwart-rood","zwart-blauw","zwart-roze"
    ];

    function fillColors(selectId, allowNone=false){
      const s = el(selectId);
      s.innerHTML = "";
      if (allowNone){
        const opt = document.createElement("option");
        opt.value = "none";
        opt.textContent = "none";
        s.appendChild(opt);
      }
      for (const c of COLORS){
        const opt = document.createElement("option");
        opt.value = c;
        opt.textContent = c.replaceAll("_","-");
        s.appendChild(opt);
      }
      s.value = allowNone ? "none" : "zwart";
    }

    fillColors("top_color");
    fillColors("bottom_color");
    fillColors("shoes_color");
    fillColors("bag_color");
    fillColors("outer_layer_color", true);

    function setOptions(selectEl, values, selectedValue) {
      selectEl.innerHTML = "";
      for (const v of values) {
        const opt = document.createElement("option");
        opt.value = v;
        opt.textContent = v.replaceAll("_"," ");
        if (selectedValue && v === selectedValue) opt.selected = true;
        selectEl.appendChild(opt);
      }
    }

    function syncBottomSubtype() {
      const bt = el("bottom_type").value;
      const subtypeEl = el("bottom_subtype");
      const current = subtypeEl.value;

      let options = ["none"];
      let fallback = "none";

      if (bt === "broek") {
        options = ["jeans", "pantalon", "stofbroek", "korte_broek"];
        fallback = "jeans";
      } else if (bt === "rok") {
        options = ["plisse_rok", "maxi_rok", "laagjesrok"];
        fallback = "maxi_rok";
      }

      setOptions(subtypeEl, options, options.includes(current) ? current : fallback);

      const hideBottomColor = (bt === "none");
      el("bottom_color_row").classList.toggle("hidden", hideBottomColor);
    }

    function syncDress() {
      const isDress = (el("garment_type").value === "jurk");
      el("bottom_block").classList.toggle("hidden", isDress);

      if (isDress) {
        el("bottom_type").value = "none";
      } else {
        if (el("bottom_type").value === "none") el("bottom_type").value = "broek";
      }
      syncBottomSubtype();
    }

    function syncBag() {
      const hasBag = el("bag_type").value !== "none";
      el("bag_color_block").classList.toggle("hidden", !hasBag);
      if (!hasBag) el("bag_color").value = "zwart";
    }

    function syncOuter() {
      const hasOuter = el("outer_layer").value !== "none";
      el("outer_color_block").classList.toggle("hidden", !hasOuter);
      if (!hasOuter) el("outer_layer_color").value = "none";
    }

    el("bottom_type").addEventListener("change", syncBottomSubtype);
    el("garment_type").addEventListener("change", syncDress);
    el("bag_type").addEventListener("change", syncBag);
    el("outer_layer").addEventListener("change", syncOuter);

    syncBottomSubtype();
    syncDress();
    syncBag();
    syncOuter();

    function resetFeedback(){
      el("feedback_block").classList.add("hidden");
      el("fb_note_block").classList.add("hidden");
      el("fb_status").textContent = "";
      el("fb_note").value = "";
    }
    resetFeedback();

    el("btn").addEventListener("click", async () => {
      el("err").textContent = "";
      el("result").textContent = "⏳ …";
      el("result").classList.remove("good","bad");
      resetFeedback();

      const garment = el("garment_type").value;
      const isDress = (garment === "jurk") ? "yes" : "no";

      const bottomType = (garment === "jurk") ? "none" : el("bottom_type").value;
      const bottomSubtype = (garment === "jurk") ? "none" : el("bottom_subtype").value;
      const bottomColor = (bottomType === "none") ? "none" : el("bottom_color").value;

      const bagType = el("bag_type").value;
      const bagPresent = (bagType === "none") ? "no" : "yes";
      const bagColor = (bagType === "none") ? "none" : el("bag_color").value;

      const outerLayer = el("outer_layer").value;
      const outerColor = (outerLayer === "none") ? "none" : el("outer_layer_color").value;

      const payload = {
        garment_type: garment,
        outer_layer: outerLayer,
        outer_layer_color: outerColor,
        bottom_subtype: bottomSubtype,
        shoe_type: el("shoe_type").value,
        bag_type: bagType,

        // oude velden (compatibel met je huidige model)
        top_color: isDress === "yes" ? "none" : el("top_color").value,
        top_type: (garment === "jurk") ? "none" : garment,
        is_dress: isDress,
        dress_color: (isDress === "yes") ? el("top_color").value : "none",

        bottom_type: bottomType,
        bottom_color: bottomColor,

        shoes_color: el("shoes_color").value,
        style: el("style").value,

        bag_present: bagPresent,
        bag_color: bagColor
      };

      lastPayload = payload;

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          const txt = await res.text();
          el("result").textContent = "❌ Error";
          el("result").classList.add("bad");
          el("err").textContent = `Server: ${res.status} ${txt}`;
          return;
        }

        const data = await res.json();
        lastResult = data;

        if (data.label === 1){
          el("result").textContent = "✅ Goed";
          el("result").classList.add("good");
        } else {
          el("result").textContent = "❌ Niet goed";
          el("result").classList.add("bad");
        }

        el("feedback_block").classList.remove("hidden");

      } catch (e) {
        el("result").textContent = "❌ Server niet bereikbaar";
        el("result").classList.add("bad");
        el("err").textContent = "Tip: staat FastAPI aan op 127.0.0.1:8000 ?";
      }
    });

    // feedback
    el("fb_yes").addEventListener("click", async () => {
      el("fb_note_block").classList.add("hidden");
      el("fb_status").textContent = "Opslaan…";
      await sendFeedback(true, "");
    });

    el("fb_no").addEventListener("click", () => {
      el("fb_note_block").classList.remove("hidden");
      el("fb_status").textContent = "Kort waarom?";
    });

    el("fb_send").addEventListener("click", async () => {
      el("fb_status").textContent = "Versturen…";
      await sendFeedback(false, el("fb_note").value.trim());
    });

    async function sendFeedback(agree, note){
      if (!lastPayload || !lastResult){
        el("fb_status").textContent = "Eerst checken.";
        return;
      }

      const body = {
        agree,
        predicted_label: lastResult.label,
        confidence: lastResult.confidence ?? null,
        note,
        payload: lastPayload
      };

      const res = await fetch(FEEDBACK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      if (!res.ok){
        const txt = await res.text();
        el("fb_status").textContent = `Fout: ${res.status} ${txt}`;
        return;
      }

      el("fb_status").textContent = "✅ Opgeslagen";
      el("fb_note").value = "";
      el("fb_note_block").classList.add("hidden");
    }
  </script>
</body>
</html>
