<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DressGPT — Versie 3</title>
  <style>
    :root{
      --bg:#10162a;
      --text:#eef2ff;
      --muted:#b7c0e6;
      --line:rgba(255,255,255,.14);
      --good:#43d38e;
      --bad:#ff6a86;
      --radius:18px;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: system-ui, Arial;
      color: var(--text);
      background:
        radial-gradient(1100px 650px at 15% 10%, rgba(167,180,255,.20), transparent 60%),
        radial-gradient(900px 550px at 88% 35%, rgba(143,232,198,.14), transparent 55%),
        var(--bg);
    }
    .wrap{ max-width: 980px; margin: 24px auto; padding: 0 16px; }
    header{ display:flex; align-items:flex-end; justify-content:space-between; gap:16px; }
    h1{ margin:0; font-size:34px; letter-spacing:.2px; }
    .tag{ color:var(--muted); font-size:13px; margin-top:6px; }
    .pill{
      border:1px solid var(--line);
      background: rgba(255,255,255,.06);
      color: var(--muted);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .card{
      margin-top: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.03));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: 0 10px 28px rgba(0,0,0,.22);
    }
    .title{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin: 0 0 10px 0;
      font-weight: 900;
      letter-spacing: .2px;
    }
    .hint{ color:var(--muted); font-size: 13px; margin-top: 6px; }
    .grid2{ display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
    label{ display:block; margin-top:10px; font-weight:800; font-size: 13px; color:#dfe6ff; }
    select, input, button{
      width:100%;
      padding: 11px 12px;
      margin-top: 6px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(8,10,22,.35);
      color: var(--text);
      font-size: 16px;
      outline: none;
    }
    button{
      cursor:pointer;
      font-weight: 950;
      letter-spacing:.2px;
      background: linear-gradient(135deg, rgba(167,180,255,.95), rgba(167,180,255,.62));
      border-color: rgba(167,180,255,.55);
      color: #0b1020;
      margin-top: 14px;
    }
    .btn-ghost{
      background: rgba(255,255,255,.06);
      border-color: var(--line);
      color: var(--text);
      font-weight: 850;
    }
    .hidden{ display:none; }
    .result{
      margin-top: 12px;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(0,0,0,.16);
      font-size: 26px;
      font-weight: 950;
      text-align:center;
    }
    .result.good{ color: var(--good); }
    .result.bad{ color: var(--bad); }
    .small{ margin-top: 8px; color: var(--muted); font-size: 13px; }

    .feedback{
      margin-top: 12px;
      padding: 12px;
      border-radius: 14px;
      border: 1px dashed rgba(255,255,255,.18);
      background: rgba(0,0,0,.12);
    }
    .fb-row{ display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    @media (max-width: 820px){
      header{ flex-direction: column; align-items:flex-start; }
      .grid2, .fb-row{ grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div>
        <h1>DressGPT</h1>
        <div class="tag">Versie 3 — één pagina + tips als er iets mist</div>
      <span class="pill">API: http://127.0.0.1:8000</span>
      </div>
    </header>

    <!-- BASIS -->
    <div class="card">
      <div class="title">Basis 👕 <span class="pill">stijl + bovenstuk</span></div>

      <div class="grid2">
        <div>
          <label>Style</label>
          <select id="style">
            <option value="casual">casual</option>
            <option value="business">business</option>
            <option value="chique">chique</option>
            <option value="sporty">sporty</option>
            <option value="preppy">preppy</option>
            <option value="netjes" selected>netjes</option>
          </select>
        </div>

        <div>
          <label>Bovenstuk</label>
          <select id="garment_type">
            <option value="jurk">jurk</option>
            <option value="tshirt" selected>T-shirt</option>
            <option value="longsleeve">lange mouwen</option>
            <option value="blouse">blouse</option>
            <option value="trui">trui</option>
            <option value="overhemd">overhemd</option>
            <option value="hoodie">hoodie</option>
          </select>
          <div class="hint">Bij “jurk” verbergen we het onderstuk.</div>
        </div>
      </div>

      <div class="grid2">
        <div>
          <label>Bovenstuk kleur</label>
          <select id="top_color"></select>
        </div>

        <div>
          <label>Vest/laag erover</label>
          <select id="outer_layer">
            <option value="none" selected>none</option>
            <option value="spijkerjasje">spijkerjasje</option>
            <option value="leren_jasje">leren jasje</option>
            <option value="bomberjack">bomberjack</option>
            <option value="colbert">colbert</option>
            <option value="opengewerkt vest">opengewerkt vest</option>
          </select>
        </div>
      </div>

      <div class="grid2 hidden" id="outer_color_block">
        <div>
          <label>Vest kleur</label>
          <select id="outer_layer_color"></select>
        </div>
        <div></div>
      </div>
    </div>

    <!-- ONDERSTUK -->
    <div class="card" id="bottom_block">
      <div class="title">Onderstuk 👖 <span class="pill">broek/rok</span></div>

      <div class="grid2">
        <div>
          <label>Onderstuk type</label>
          <select id="bottom_type">
            <option value="broek" selected>broek</option>
            <option value="rok">rok</option>
            <option value="none">none</option>
          </select>
        </div>

        <div>
          <label>Onderstuk soort</label>
          <select id="bottom_subtype"></select>
        </div>
      </div>

      <div class="grid2" id="bottom_color_row">
        <div>
          <label>Onderstuk kleur</label>
          <select id="bottom_color"></select>
        </div>
        <div></div>
      </div>
    </div>

    <!-- ACCESSOIRES -->
    <div class="card">
      <div class="title">Accessoires 👜 <span class="pill">schoenen + tas</span></div>

      <div class="grid2">
        <div>
          <label>Schoenen type</label>
          <select id="shoe_type">
            <option value="sneakers" selected>sneakers</option>
            <option value="sportschoenen">sportschoenen</option>
            <option value="sandalen">sandalen</option>
            <option value="slippers">slippers</option>
            <option value="hakken">hakken</option>
            <option value="laarzen">laarzen</option>
            <option value="veterschoenen">veterschoenen</option>
          </select>
        </div>

        <div>
          <label>Schoenen kleur</label>
          <select id="shoes_color"></select>
        </div>
      </div>

      <div class="grid2">
        <div>
          <label>Tas type</label>
          <select id="bag_type">
            <option value="none" selected>none</option>
            <option value="handtas">handtas</option>
            <option value="schoudertas">schoudertas</option>
            <option value="rugtas">rugtas</option>
            <option value="clutch">clutch</option>
            <option value="werktas">werktas</option>
          </select>
        </div>

        <div class="hidden" id="bag_color_block">
          <label>Tas kleur</label>
          <select id="bag_color"></select>
        </div>
      </div>

      <button id="btn" type="button">Check outfit</button>

      <div class="result" id="result">—</div>
      <div class="small" id="err"></div>
      <div class="small" id="reason"></div>
      <div class="small" id="tips"></div>
      <div class="small" id="vibe"></div>

      <!-- FEEDBACK -->
      <div class="feedback hidden" id="feedback_block">
        <div class="fb-row">
          <button id="fb_yes" type="button" class="btn-ghost">👍 Eens</button>
          <button id="fb_no" type="button" class="btn-ghost">👎 Niet eens</button>
        </div>

        <div class="hidden" id="fb_note_block">
          <label>Waarom?</label>
          <input id="fb_note" placeholder="kort: wat klopt er niet?" />
          <button id="fb_send" type="button" class="btn-ghost">Verstuur</button>
        </div>

        <div class="small" id="fb_status"></div>
      </div>
    </div>
  </div>

<script>
const API_BASE = "http://127.0.0.1:8000";
const API_URL = `${API_BASE}/predict`;
const FEEDBACK_URL = `${API_BASE}/feedback`;
const el = (id) => document.getElementById(id);

function setTip(message){
  el("err").textContent = message || "Er gaat iets mis, probeer het later opnieuw.";
}

let lastPayload = null;
let lastResult = null;

const COLORS = [
  "zwart","wit","grijs","bruin",
  "rood","lichtrood","donkerrood",
  "oranje","lichtoranje","donkeroranje",
  "geel","lichtgeel","donkergeel",
  "groen","lichtgroen","donkergroen",
  "blauw","lichtblauw","donkerblauw",
  "paars","lichtpaars","donkerpaars",
  "roze","lichtroze","donkerroze",
  "zwart-wit","rood-wit","blauw-wit","roze-wit","groen-wit","multicolor"
];

function fillColors(id, allowNone=false){
  const s = el(id);
  if (!s) return;

  s.innerHTML = "";

  if (allowNone){
    const opt = document.createElement("option");
    opt.value = "none";
    opt.textContent = "none";
    s.appendChild(opt);
  }

  COLORS.forEach(c=>{
    const opt = document.createElement("option");
    opt.value = c;
    opt.textContent = c;
    s.appendChild(opt);
  });

  s.value = allowNone ? "none" : "zwart";
}

["top_color","bottom_color","shoes_color","bag_color"].forEach(id=>fillColors(id));
fillColors("outer_layer_color", true);


function setOptions(selectEl, values, selected){
  selectEl.innerHTML = "";
  values.forEach(v=>{
    const opt = document.createElement("option");
    opt.value = v;
    opt.textContent = v.replaceAll("_"," ");
    if (v === selected) opt.selected = true;
    selectEl.appendChild(opt);
  });
}

function syncBottomSubtype(){
  const bt = el("bottom_type").value;
  const sub = el("bottom_subtype");

  if (bt === "broek"){
    setOptions(sub, ["jeans","pantalon","stofbroek","korte_broek"], "jeans");
  } else if (bt === "rok"){
    setOptions(sub, ["plisse_rok","maxi_rok","laagjesrok"], "maxi_rok");
  } else {
    setOptions(sub, ["none"], "none");
  }

  el("bottom_color_row").classList.toggle("hidden", bt==="none");
}

function syncDress(){
  const isDress = el("garment_type").value === "jurk";
  el("bottom_block").classList.toggle("hidden", isDress);

  if (isDress){
    el("bottom_type").value = "none";
  }
  syncBottomSubtype();
}

function syncBag(){
  const show = el("bag_type").value !== "none";
  el("bag_color_block").classList.toggle("hidden", !show);
}

function syncOuter(){
  const show = el("outer_layer").value !== "none";
  el("outer_color_block").classList.toggle("hidden", !show);
}

["bottom_type","garment_type","bag_type","outer_layer"].forEach(id=>{
  const node = el(id);
  if (node) node.addEventListener("change", ()=>{
    syncBottomSubtype();
    syncDress();
    syncBag();
    syncOuter();
  });
});

function validate(){
  const v = (id)=>el(id)?.value || "none";

  if (!v("top_color")) return "Kies een bovenstuk kleur";
  if (!v("shoes_color")) return "Kies schoenen kleur";

  if (v("bag_type") !== "none" && !v("bag_color")){
    return "Kies tas kleur";
  }

  return "";
}

const btn = el("btn");


if (btn){
btn.addEventListener("click", async ()=>{

  const error = validate();
  if (error){
    setTip(error);
    return;
  }

  setTip("");

  const payload = {
    garment_type: el("garment_type").value,
    outer_layer: el("outer_layer").value,
    outer_layer_color: el("outer_layer_color").value,
    bottom_subtype: el("bottom_subtype").value,
    shoe_type: el("shoe_type").value,
    bag_type: el("bag_type").value,

    top_color: el("top_color").value,
    top_type: el("garment_type").value,
    is_dress: el("garment_type").value === "jurk" ? "yes":"no",
    dress_color: "none",

    bottom_type: el("bottom_type").value,
    bottom_color: el("bottom_color").value,

    shoes_color: el("shoes_color").value,
    style: el("style").value,

    bag_present: el("bag_type").value==="none"?"no":"yes",
    bag_color: el("bag_color").value
  };

  lastPayload = payload;

  el("result").textContent = "Aan het denken...";

  try{
    const res = await fetch(API_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify(payload)

    });

    const data = await res.json();
    console.log("predict data:", data);
    lastResult = data;

    if (typeof data.label === "undefined") {
      el("result").textContent = "❌ Geen label van backend";
      el("result").classList.add("bad");
      el("err").textContent = JSON.stringify(data);
      return;
    }

el("result").textContent = data.label===1 ? "✅ Goed" : "❌ Niet goed";
el("reason").textContent = data.reason || "";
el("tips").innerHTML = (data.tips || []).map(t => "• " + t).join("<br>");
el("vibe").textContent = data.vibe ? "Vibe: " + data.vibe : "";

} catch(e){
  el("result").textContent = "❌ Server error";
}

});
}

async function sendFeedback(agree, note){

  if (!lastPayload || !lastResult) return;

  await fetch(FEEDBACK_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      agree,
      predicted_label: lastResult.label,
      confidence: lastResult.confidence ?? null,
      note,
      payload: lastPayload
    })
  });
}
</script>

</body>
</html>
